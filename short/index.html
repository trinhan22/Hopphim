ity: 0; } .mobile-play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; background: rgba(0,0,0,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #fff; pointer-events: none; opacity: 0; transition: 0.2s; z-index: 6; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2); } .mobile-play-overlay.show { opacity: 1; transform: translate(-50%, -50%) scale(1.0); } .ep-tabs-container { padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; background: rgba(0,0,0,0.2); } .ep-tabs-container::-webkit-scrollbar { display: none; } .ep-tab-btn { padding: 6px 12px; background: rgba(255,255,255,0.08); color: #aaa; border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer; border: 1px solid transparent; transition: 0.2s; flex-shrink: 0; display: flex; align-items: center; justify-content: center; } .ep-tab-btn:hover { background: rgba(255,255,255,0.15); color: #fff; } .ep-tab-btn.active { background: var(--gradient); color: #fff; border-color: transparent; box-shadow: 0 4px 10px rgba(255, 94, 98, 0.3); } .pc-video-wrapper.animating { pointer-events: none; } @keyframes slideUpEffect { 0% { transform: translateY(0); opacity: 1; filter: blur(0); } 45% { transform: translateY(-40px); opacity: 0; filter: blur(10px); } 55% { transform: translateY(40px); opacity: 0; filter: blur(10px); } 100% { transform: translateY(0); opacity: 1; filter: blur(0); } } @keyframes slideDownEffect { 0% { transform: translateY(0); opacity: 1; filter: blur(0); } 45% { transform: translateY(40px); opacity: 0; filter: blur(10px); } 55% { transform: translateY(-40px); opacity: 0; filter: blur(10px); } 100% { transform: translateY(0); opacity: 1; filter: blur(0); } } .anim-next video { animation: slideUpEffect 0.5s cubic-bezier(0.4, 0, 0.2, 1); } .anim-prev video { animation: slideDownEffect 0.5s cubic-bezier(0.4, 0, 0.2, 1); } </style></head><body><div id="loadingScreen"><img src="/Loading.png" class="loading-img" alt="Wibey"></div><div class="top-nav"><div class="nav-content"><a href="/" class="logo-box" style="text-decoration: none;"><img src="/LOGO.WEBP" alt="Logo"><span>Wibey</span></a></div></div><div class="app-container"><div class="pc-player-area"><div class="pc-bg-blur" id="pcBgBlur"></div><div class="pc-video-wrapper"><video id="pcVideo" controls autoplay playsinline></video></div><div class="nav-arrow prev-arrow" onclick="playNext(-1)"><i class="fas fa-chevron-up"></i></div><div class="nav-arrow next-arrow" onclick="playNext(1)"><i class="fas fa-chevron-down"></i></div></div><div class="pc-sidebar"><div class="info-box"><h1 class="movie-title" id="mTitle"></h1><div class="tags-row"><span class="tag main">Short Drama</span><span class="tag">HD Vietsub</span><span class="tag" id="mYear">2025</span></div><div class="movie-desc-container"><div class="movie-desc" id="mDescText"></div><span class="read-more-btn" id="readMoreBtn" onclick="toggleDescription()" style="display:none;">Xem thêm</span></div><div class="stats-row"><div class="stat"><i class="fas fa-heart"></i><span id="statLike"></span></div><div class="stat"><i class="fas fa-eye"></i><span id="statView"></span></div><div class="stat"><i class="fas fa-share-alt"></i> Share</div></div></div><div class="ep-box"><div class="ep-header"><h3>Danh sách tập</h3><span style="font-size:0.8rem; color:var(--primary);" id="epTotal"></span></div><div class="ep-tabs-container" id="pcEpTabs"></div><div class="ep-list-wrapper"><div class="ep-grid" id="pcEpGrid"></div></div></div></div><div class="mobile-container" id="mobileSwiper"></div><div class="m-playlist-btn pc-hidden" onclick="toggleDrawer()" style="display:none;" id="mPlaylistBtn"><i class="fas fa-layer-group"></i><span id="mCurEp">Danh sách tập</span></div></div><div class="drawer-overlay" onclick="toggleDrawer()"></div><div class="drawer-panel"><div class="d-header"><div class="d-title">Chọn tập phim</div><i class="fas fa-times d-close" onclick="toggleDrawer()"></i></div><div class="d-body"><div class="ep-tabs-container" id="mobileEpTabs" style="margin-bottom: 10px;"></div><div class="ep-grid" id="mobileEpGrid"></div></div></div><script type="module"> import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"; import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"; import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"; const firebaseConfig = { apiKey: "AIzaSyAT6SnKojUmsisDhnuEtsL3H59NwrhZxDc", authDomain: "hopphim-29e1c.firebaseapp.com", projectId: "hopphim-29e1c", storageBucket: "hopphim-29e1c.firebasestorage.app", messagingSenderId: "1076044580405", appId: "1:1076044580405:web:a3485f8533604f305e537c", measurementId: "G-6RT4CX2NR0" }; const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app); const API_BASE = 'https://ophim1.com/v1/api/phim'; let movieData = null; let episodes = []; let currentEpIndex = 0; let fullDesc = ""; let isMobile = window.innerWidth <= 1024; let pcPlyr = null; let currentTabStart = 0; let infoTimeout = null; let isScrolling = false; window.saveShortTimeout = null; const waveSvg = `<svg class="wave" viewBox="0 0 24 24" fill="#fff"><path d="M10 20H14V4H10V20ZM4 20H8V9H4V20ZM16 9V20H20V9H16Z"/></svg>`; window.addEventListener('wheel', (e) => { if (window.innerWidth > 1024 && !isScrolling) { const sidebar = document.querySelector('.pc-sidebar'); if (sidebar && !sidebar.contains(e.target)) { if (e.deltaY > 0) window.playNext(1); else window.playNext(-1); isScrolling = true; setTimeout(() => { isScrolling = false; }, 600); } } }); onAuthStateChanged(auth, async (user) => { const path = window.location.pathname; let slug = path.split('/').pop(); if(!slug || slug === 'short' || slug.includes('html')) { slug = new URLSearchParams(window.location.search).get('slug') || 'gio-nam-biet-long-toi'; } if (user) { window.currentUser = user; if(movieData) checkHistoryAndResume(); } if (!movieData) { await loadData(slug); } }); async function checkHistoryAndResume() { if (!window.currentUser || !movieData) return; console.log("🔍 Kiểm tra lịch sử Short..."); try { const snap = await getDoc(doc(db, "users", window.currentUser.uid)); if (snap.exists()) { const h = snap.data().watchHistory || []; const f = h.find(i => i.slug === movieData.slug); if (f && f.epIndex !== undefined) { const resumeIdx = parseInt(f.epIndex); console.log("⚡ Tìm thấy lịch sử Short: Tập", resumeIdx + 1); if (resumeIdx > 0 && resumeIdx < episodes.length) { const chunkSize = 30; const neededTab = Math.floor(resumeIdx / chunkSize) * chunkSize; if (neededTab !== currentTabStart) window.switchTab(neededTab); if (isMobile) { setTimeout(() => { const slide = document.getElementById(`m-slide-${resumeIdx}`); if(slide) { slide.scrollIntoView({ behavior: 'auto' }); currentEpIndex = resumeIdx; document.getElementById('mCurEp').innerText = `Tập ${episodes[resumeIdx].name.replace(/tập/ig,'').trim()} / ${episodes.length}`; window.updateActiveBtn(resumeIdx); } }, 500); } else { window.playPC(resumeIdx); } } } } } catch(e) { console.error("Resume Error:", e); } } async function loadData(slug) { try { const res = await fetch(`${API_BASE}/${slug}`); if (!res.ok) throw new Error("API Error"); const data = await res.json(); if (data.status) { movieData = data.data.item; episodes = movieData.episodes[0].server_data; if (!episodes.length) { alert('Phim lỗi!'); return; } renderInfo(); currentTabStart = 0; renderGrids(); if (isMobile) { document.getElementById('mPlaylistBtn').style.display = 'flex'; renderMobileSlides(); } else { document.getElementById('pcBgBlur').style.backgroundImage = `url('${movieData.poster_url}')`; window.playPC(0, 0, false); } hideLoadingState(); if(window.currentUser) checkHistoryAndResume(); } else { document.getElementById('loadingScreen').innerHTML = '<div style="color:white;text-align:center">Phim không tồn tại</div>'; } } catch (e) { console.error(e); } } function renderGrids() { const total = episodes.length; const chunkSize = 30; let tabsHtml = ''; if (total > chunkSize) { for (let i = 0; i < total; i += chunkSize) { const end = Math.min(i + chunkSize, total); const isActive = (i === currentTabStart) ? 'active' : ''; tabsHtml += `<div class="ep-tab-btn ${isActive}" onclick="window.switchTab(${i})">${i + 1}-${end}</div>`; } } else { tabsHtml = `<div class="ep-tab-btn active">Trọn bộ</div>`; } const pcTabs = document.getElementById('pcEpTabs'); const mbTabs = document.getElementById('mobileEpTabs'); if (pcTabs) pcTabs.innerHTML = tabsHtml; if (mbTabs) mbTabs.innerHTML = tabsHtml; renderEpListOnly(); } window.switchTab = (start) => { currentTabStart = start; renderGrids(); }; function renderEpListOnly() { let listHtml = ''; const end = Math.min(currentTabStart + 30, episodes.length); for (let i = currentTabStart; i < end; i++) { const displayNum = i + 1; const activeClass = (i === currentEpIndex) ? 'active' : ''; listHtml += `<div class="ep-item ${activeClass}" id="btn-${i}" onclick="window.handleEpClick(${i})"><span>${displayNum}</span>${waveSvg}</div>`; } document.getElementById('pcEpGrid').innerHTML = listHtml; document.getElementById('mobileEpGrid').innerHTML = listHtml; } function startInfoTimer(index) { clearTimeout(infoTimeout); infoTimeout = setTimeout(() => { const info = document.getElementById(`m-info-${index}`); if(info) info.classList.add('hidden'); }, 3000); } function renderMobileSlides() { const container = document.getElementById('mobileSwiper'); let html = ''; episodes.forEach((ep, idx) => { const srcAttr = idx === 0 ? `src="${ep.link_m3u8}"` : `data-src="${ep.link_m3u8}"`; let name = ep.name.replace(/tập/ig, '').trim(); html += ` <div class="m-slide" id="m-slide-${idx}" onclick="window.toggleMobileVideo(this, ${idx})"><video ${srcAttr} playsinline loop muted></video><div class="mobile-play-overlay"><i class="fas fa-play"></i></div><div class="m-info" id="m-info-${idx}"><div class="m-title"><span class="m-badge">Tập ${name}</span> ${movieData.name}</div><div class="m-desc">${movieData.origin_name}</div></div><div class="m-actions"><div class="m-btn-icon" style="color:#ff4757; border-color:#ff4757;" onclick="event.stopPropagation()"><i class="fas fa-heart"></i></div><span class="m-btn-text">Love</span><div class="m-btn-icon" style="margin-top:15px;" onclick="event.stopPropagation()"><i class="fas fa-share"></i></div><span class="m-btn-text">Share</span></div></div>`; }); container.innerHTML = html; const v1 = document.getElementById('m-slide-0').querySelector('video'); setupMobileVideoEvents(v1, 0); loadHls(v1, episodes[0].link_m3u8); initObserver(); window.updateActiveBtn(0); } window.toggleMobileVideo = (slide, index) => { const video = slide.querySelector('video'); const info = document.getElementById(`m-info-${index}`); const playIcon = slide.querySelector('.mobile-play-overlay'); if (video.paused) { video.play(); playIcon.classList.remove('show'); startInfoTimer(index); } else { video.pause(); playIcon.classList.add('show'); if(info) info.classList.remove('hidden'); clearTimeout(infoTimeout); } }; function initObserver() { const observer = new IntersectionObserver((entries) => { entries.forEach(entry => { const video = entry.target.querySelector('video'); const index = parseInt(entry.target.id.split('-')[1]); if (entry.isIntersecting) { const lazySrc = video.getAttribute('data-src'); if (lazySrc) { loadHls(video, lazySrc); video.removeAttribute('data-src'); } setupMobileVideoEvents(video, index); video.muted = false; video.play().then(() => { const info = document.getElementById(`m-info-${index}`); const playIcon = entry.target.querySelector('.mobile-play-overlay'); if(playIcon) playIcon.classList.remove('show'); if(info) info.classList.remove('hidden'); startInfoTimer(index); }).catch(() => video.muted = true); currentEpIndex = index; window.updateActiveBtn(index); document.getElementById('mCurEp').innerText = `Tập ${episodes[index].name.replace(/tập/ig,'').trim()} / ${episodes.length}`; if (window.saveShortTimeout) clearTimeout(window.saveShortTimeout); window.saveShortTimeout = setTimeout(() => window.saveShortHistory(index), 2000); } else { video.pause(); video.currentTime = 0; const info = document.getElementById(`m-info-${index}`); if(info) info.classList.remove('hidden'); } }); }, { threshold: 0.6 }); document.querySelectorAll('.m-slide').forEach(s => observer.observe(s)); } function setupMobileVideoEvents(video, index) { video.loop = false; video.onended = () => { const nextIndex = index + 1; if (nextIndex < episodes.length) { const nextSlide = document.getElementById(`m-slide-${nextIndex}`); if (nextSlide) nextSlide.scrollIntoView({ behavior: 'smooth' }); } }; } window.playPC = (index, startTime = 0, saveImmediate = true) => { if (index < 0 || index >= episodes.length) return; currentEpIndex = index; window.updateActiveBtn(index); const video = document.getElementById('pcVideo'); const link = episodes[index].link_m3u8; const plyrOptions = { keyboard: { focused: false, global: false }, controls: ['play-large', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'], seekTime: 10 }; if (!pcPlyr) { pcPlyr = new Plyr(video, plyrOptions); setupPauseOverlay(pcPlyr); pcPlyr.on('ended', () => window.playNext(1)); } if(window.updatePauseLabel) window.updatePauseLabel(index); if (Hls.isSupported()) { const hls = new Hls(); hls.loadSource(link); hls.attachMedia(video); hls.on(Hls.Events.MANIFEST_PARSED, () => pcPlyr.play().catch(()=>{})); } else { video.src = link; pcPlyr.play().catch(()=>{}); } if (saveImmediate) { window.saveShortHistory(index); } }; window.playNext = (step) => { const nextIndex = currentEpIndex + step; if (nextIndex < 0 || nextIndex >= episodes.length) return; const wrapper = document.querySelector('.pc-video-wrapper'); if (step > 0) wrapper.classList.add('anim-next', 'animating'); else wrapper.classList.add('anim-prev', 'animating'); setTimeout(() => { window.playPC(nextIndex); }, 200); setTimeout(() => { wrapper.classList.remove('anim-next', 'anim-prev', 'animating'); }, 500); }; window.handleEpClick = (index) => { if (isMobile) { const slide = document.getElementById(`m-slide-${index}`); if (slide) { slide.scrollIntoView({ behavior: 'auto' }); window.toggleDrawer(); } } else { window.playPC(index); } }; window.updateActiveBtn = (index) => { const chunkSize = 30; const neededTab = Math.floor(index / chunkSize) * chunkSize; if (neededTab !== currentTabStart) window.switchTab(neededTab); setTimeout(() => { document.querySelectorAll('.ep-item').forEach(b => b.classList.remove('active')); const btn = document.getElementById(`btn-${index}`); if(btn) { btn.classList.add('active'); if(!isMobile) btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); } }, 50); }; window.toggleDescription = () => { const descBox = document.getElementById('mDescText'); const btn = document.getElementById('readMoreBtn'); const tempDiv = document.createElement("div"); tempDiv.innerHTML = fullDesc; const text = tempDiv.innerText; if (btn.innerText === "Xem thêm") { descBox.innerHTML = text; btn.innerText = "Thu gọn"; } else { const words = text.split(" "); descBox.innerHTML = words.slice(0, 36).join(" ") + "..."; btn.innerText = "Xem thêm"; } }; window.toggleDrawer = () => { document.querySelector('.drawer-panel').classList.toggle('active'); document.querySelector('.drawer-overlay').classList.toggle('active'); }; window.saveShortHistory = async (epIndex) => { if (!window.currentUser || !movieData) return; const ep = episodes[epIndex]; const shortEpName = ep.name.replace(/tập/ig, '').trim(); const historyItem = { slug: movieData.slug, name: movieData.name, origin_name: movieData.origin_name || "", thumb_url: movieData.thumb_url, poster_url: movieD .createElement('div'); overlay.className = 'pause-overlay'; const tempDiv = document.createElement("div"); tempDiv.innerHTML = movieData.content || "Đang cập nhật..."; const rawDesc = tempDiv.innerText; overlay.innerHTML = `<div class="pause-info-content"><div class="pause-ep-title" id="pauseEpLabel">ĐANG PHÁT: TẬP ${currentEpIndex + 1}</div><div class="pause-movie-title">${movieData.name}</div><div class="pause-desc">${rawDesc}</div></div>`; const container = player.elements.container; container.appendChild(overlay); player.on('pause', () => { if (!player.ended) overlay.classList.add('active'); }); player.on('play', () => overlay.classList.remove('active')); window.updatePauseLabel = (idx) => { const label = document.getElementById('pauseEpLabel'); if(label) label.innerText = `ĐANG PHÁT: TẬP ${idx + 1}`; }; } function hideLoadingState() { setTimeout(() => { const screen = document.getElementById('loadingScreen'); const img = screen?.querySelector('.loading-img'); if(img) { img.classList.add('zoom-out'); setTimeout(() => { if(screen) screen.style.display = 'none'; }, 480); } else { if(screen) screen.style.display = 'none'; } }, 500); } document.addEventListener('keydown', (e) => { if (isMobile || !pcPlyr) return; const tag = document.activeElement.tagName.toUpperCase(); if (tag === 'INPUT' || tag === 'TEXTAREA' || document.activeElement.isContentEditable) return; const key = e.key.toLowerCase(); switch (key) { case ' ': case 'k': e.preventDefault(); pcPlyr.togglePlay(); break; case 'f': pcPlyr.fullscreen.toggle(); break; case 'm': pcPlyr.muted = !pcPlyr.muted; break; case 'arrowleft': case 'j': pcPlyr.rewind(10); break; case 'arrowright': case 'l': pcPlyr.forward(10); break; } });</script><script type="text/javascript"> document.addEventListener('contextmenu', function(e) { e.preventDefault(); }); document.addEventListener('keydown', function(e) { if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; } if (e.ctrlKey) { switch (e.key.toLowerCase()) { case 'u': case 's': case 'p': e.preventDefault(); return false; } if (e.shiftKey) { switch (e.key.toLowerCase()) { case 'i': case 'j': case 'c': e.preventDefault(); return false; } } } });</script></body></html>
