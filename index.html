<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Báo Đóng Cửa - Wibey</title>
    
    <link rel="icon" type="image/webp" href="/LOGO.WEBP" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f111a; /* Nền tối đậm phong cách Wibey */
            color: #ffffff; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        /* Hiệu ứng mờ nền (Đổi sang tông Cam - Đỏ Wibey) */
        .background-blobs { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15; }
        .blob-1 { width: 600px; height: 600px; background: #FF8F50; top: -20%; right: 10%; } /* Cam */
        .blob-2 { width: 400px; height: 400px; background: #FF5E62; bottom: 10%; left: -10%; } /* Đỏ hồng */

        /* Khung thông báo trung tâm */
        .notice-card {
            background: rgba(30, 33, 43, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 94, 98, 0.2); /* Viền đỏ hồng mờ */
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 650px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 0 40px rgba(255, 143, 80, 0.05);
            position: relative;
            z-index: 10;
        }

        /* Họa tiết lưới (grid) mờ phía sau */
        .notice-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            border-radius: 24px;
            z-index: -1;
            opacity: 0.5;
        }

        /* Icon cảnh báo (Gradient Wibey) */
        .alert-icon-box {
            background: linear-gradient(135deg, #FF8F50 0%, #FF5E62 100%);
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
            box-shadow: 0 10px 25px rgba(255, 94, 98, 0.4);
        }
        .alert-icon-box i {
            color: #fff; /* Chuyển sang trắng để nổi bật trên nền cam */
            font-size: 2rem;
        }

        /* Tag "Thông báo chính thức" */
        .official-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 143, 80, 0.4);
            color: #FF8F50;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255, 143, 80, 0.05);
        }
        .official-tag .dot {
            width: 8px;
            height: 8px;
            background-color: #FF5E62;
            border-radius: 50%;
            box-shadow: 0 0 8px #FF5E62;
            animation: pulseDot 2s infinite;
        }

        @keyframes pulseDot {
            0% { box-shadow: 0 0 0 0 rgba(255, 94, 98, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(255, 94, 98, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 94, 98, 0); }
        }

        .notice-title {
            font-size: 3.5rem;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .notice-desc {
            font-size: 1.1rem;
            color: #a0a0a0;
            line-height: 1.6;
            font-weight: 500;
            max-width: 90%;
            margin: 0 auto;
        }

        .footer-text {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #555;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .notice-card { padding: 40px 20px; }
            .notice-title { font-size: 2.5rem; }
            .notice-desc { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="notice-card">
        <div class="alert-icon-box">
            <i class="fas fa-exclamation"></i>
        </div>
        
        <div class="official-tag">
            <span class="dot"></span> Thông báo chính thức
        </div>
        
        <h1 class="notice-title">Website đã đóng cửa</h1>
        
        <p class="notice-desc">
            Trang web <strong>Wibey</strong> chính thức <strong>ngừng hoạt động</strong> kể từ ngày <strong>10/05/2026.</strong>
        </p>
        <p class="notice-desc">
            Quyết định này nhằm mục đích <strong>tuân thủ nghiêm túc</strong> các quy định của <strong>pháp luật Việt Nam</strong>.
        </p>
    </div>

    <div class="footer-text">
        © 2026 — Service unavailable
    </div>

    <script type="text/javascript">
    // Chặn Chuột phải (Để ẩn menu "Inspect/Kiểm tra" và "View Source/Xem nguồn")
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

    // Chặn các phím tắt Developer Tools
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
        if (e.ctrlKey) {
            switch (e.key.toLowerCase()) {
                case 'u': case 's': case 'p': e.preventDefault(); return false;
            }
            if (e.shiftKey) {
                switch (e.key.toLowerCase()) {
                    case 'i': case 'j': case 'c': e.preventDefault(); return false;
                }
            }
        }
    });
    </script>
</body>
</html>
