<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WibuPhim - Phim Hay Trong Tầm Tay</title>
    
    <meta property="og:title" content="WibuPhim - Phim Hay Trong Tầm Tay" />
    <meta property="og:description" content="Trang xem phim trực tuyến miễn phí chất lượng cao." />
    <meta property="og:image" content="https://wibuphim.netlify.app/panel.webp" />
    <meta property="og:url" content="https://wibuphim.netlify.app" />
    <meta property="og:type" content="article" />

    <link rel="icon" type="image/webp" href="/LOGO.WEBP" />
    
    <style>
        /* Xóa viền và căn giữa toàn bộ trang */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff; /* Nền đen giúp tôn ảnh lên */
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh; /* Cao bằng 100% màn hình thiết bị */
            overflow: hidden; /* Chặn lăn chuột / trượt màn hình */
        }

        /* Tối ưu hóa ảnh cho Mobile & PC */
        .responsive-img {
            max-width: 100%; /* Không bao giờ tràn viền ngang */
            max-height: 100%; /* Không bao giờ tràn viền dọc */
            width: auto;
            height: auto;
            object-fit: contain; /* Đảm bảo giữ đúng tỉ lệ 16:9, không bị cắt xén */
            
            /* Tùy chọn: Chống click chuột phải/tải ảnh trên mobile */
            user-select: none;
            -webkit-user-drag: none;
        }

        /* NẾU BẠN MUỐN ẢNH PHỦ KÍN 100% MÀN HÌNH ĐIỆN THOẠI (BỊ CẮT BỚT 2 BÊN TRÁI PHẢI):
           Hãy xóa đoạn CSS của .responsive-img ở trên và dùng đoạn dưới đây:
        
        .responsive-img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }
        */
    </style>
</head>
<body>

    <img src="1.png" alt="Full HD Image" class="responsive-img">

</body>
</html>
